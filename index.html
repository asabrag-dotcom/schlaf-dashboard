<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schlaf-Dashboard – Björn</title>
<style>
  body { background:#0f1117; color:#e8eaf0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; gap:20px; }
  h1 { font-size:1.6rem; margin-bottom:4px; }
  .sub { color:#8892a4; font-size:0.9rem; margin-bottom:16px; }
  .btn { display:block; background:#1a1d27; border:1px solid #2d3148; border-radius:12px; padding:18px 28px; text-decoration:none; color:#e8eaf0; width:280px; text-align:center; transition:background 0.2s; }
  .btn:hover { background:#22263a; }
  .btn-label { font-size:0.72rem; color:#8892a4; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .btn-title { font-size:1.1rem; font-weight:700; }
  .btn-sub { font-size:0.78rem; color:#8892a4; margin-top:4px; }
  .accent { border-top:3px solid #5b8dee; }
  .rem { border-top:3px solid #9f7aea; }
  #latest-date { color:#9f7aea; }
</style>
</head>
<body>
<div style="text-align:center">
  <h1>🌙 Schlaf-Dashboard</h1>
  <div class="sub">Björn</div>
</div>

<a class="btn accent" href="schlaf_dashboard.html">
  <div class="btn-label">Interaktives Dashboard</div>
  <div class="btn-title">📊 Alle Nächte</div>
  <div class="btn-sub">Charts, Trends, Korrelationen</div>
</a>

<a class="btn rem" id="briefing-link" href="#">
  <div class="btn-label">Heutiges Briefing</div>
  <div class="btn-title">🩺 Schlafmediziner-Analyse</div>
  <div class="btn-sub" id="latest-date">Wird geladen…</div>
</a>

<script>
// Heutiges Datum und gestern berechnen
function pad(n) { return String(n).padStart(2,'0'); }
function dateStr(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

const today = new Date();
const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);

// Versuche erst gestern, dann vorgestern, dann heute
const candidates = [yesterday, today, new Date(today.setDate(today.getDate()-1))];
const dates = [...new Set(candidates.map(dateStr))];

async function findLatest() {
  for (const d of dates) {
    const url = 'schlaf_briefing_' + d + '.html';
    try {
      const r = await fetch(url, {method:'HEAD'});
      if (r.ok) {
        document.getElementById('briefing-link').href = url;
        document.getElementById('latest-date').textContent = 'Nacht vom ' + d;
        return;
      }
    } catch(e) {}
  }
  document.getElementById('latest-date').textContent = 'Noch kein Briefing heute';
  document.getElementById('briefing-link').style.opacity = '0.5';
}
findLatest();
</script>
</body>
</html>
